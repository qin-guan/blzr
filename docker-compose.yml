services:
  blzr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blzr-signboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      RoomStore__Path: /data/rooms.json
    volumes:
      - blzr-data:/data

volumes:
  blzr-data:
